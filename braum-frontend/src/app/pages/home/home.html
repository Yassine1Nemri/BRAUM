<div class="home">
  <main class="container fade-in" aria-labelledby="braum-title">
    <header class="brand">
      <div class="logo" id="braum-title">
        <span class="shield" aria-hidden="true">🛡️</span>
        <span class="word">BRAUM</span>
      </div>
      <p class="subtitle">Website Security Posture Scanner</p>
      <p class="tagline">Scan any URL for headers, SSL, ports and exposed files</p>
    </header>

    <form class="scan-form" (ngSubmit)="onSubmit()">
      <label class="sr-only" for="url">Target URL</label>
      <div class="input-row">
        <input
          type="url"
          id="url"
          [(ngModel)]="url"
          name="url"
          required
          placeholder="https://example.com"
          class="url-input"
          [attr.aria-invalid]="errorMessage ? 'true' : 'false'"
          [disabled]="isScanning"
        />

        <button
          type="submit"
          class="scan-btn"
          [disabled]="isScanning || !url.trim()"
        >
          <ng-container *ngIf="!isScanning">Scan Now</ng-container>
          <span *ngIf="isScanning" class="btn-loading">
            <span class="spinner" aria-hidden="true"></span>
            Scanning...
          </span>
        </button>
      </div>

      <p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
    </form>

    <div class="stats" aria-label="Scanner capabilities">
      <span class="badge">4 Scanners</span>
      <span class="badge">Real-time Results</span>
      <span class="badge">Security Grade A-F</span>
    </div>

    <footer class="footer">
      Only scan domains you own or have permission to test
    </footer>
  </main>
</div>
