<div class="min-h-screen bg-gray-900 flex items-center justify-center px-4">
  <div class="max-w-md w-full space-y-8">
    <div class="text-center">
      <h1 class="text-6xl font-bold text-white mb-2">BRAUM</h1>
      <p class="text-gray-400">Website Security Scanner</p>
    </div>
    <form (ngSubmit)="onSubmit()" class="space-y-6">
      <div>
        <label for="url" class="block text-sm font-medium text-gray-300 mb-2">
          Website URL
        </label>
        <input
          type="url"
          id="url"
          [(ngModel)]="url"
          name="url"
          required
          placeholder="https://example.com"
          class="w-full px-3 py-2 border border-gray-600 rounded-md shadow-sm placeholder-gray-400 bg-gray-800 text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
        />
      </div>
      <button
        type="submit"
        class="w-full flex justify-center py-2 px-4 border border-transparent rounded-md shadow-sm text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500"
      >
        Scan Now
      </button>
    </form>
  </div>
</div>
